<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tech Talks</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem;
    }
    h1 {
      font-size: 2.5rem;
      color: #f0f6fc;
      margin-bottom: 0.5rem;
    }
    p.subtitle {
      color: #8b949e;
      margin-bottom: 3rem;
      font-size: 1.1rem;
    }
    .talks {
      list-style: none;
      width: 100%;
      max-width: 640px;
    }
    .talks li {
      margin-bottom: 1rem;
    }
    .talks a {
      display: block;
      padding: 1.25rem 1.5rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #58a6ff;
      text-decoration: none;
      font-size: 1.15rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .talks a:hover {
      background: #1c2128;
      border-color: #58a6ff;
    }
    .talks .date {
      display: block;
      font-size: 0.85rem;
      color: #8b949e;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <h1>🎤 Tech Talks</h1>
  <p class="subtitle">Slide decks by feoh</p>
  <ul class="talks">
    <li>
      <a href="pi-tech-talk.html">
        Pi — One LLM Interface to Rule Them All!
        <span class="date">May 2026</span>
      </a>
    </li>
  </ul>
</body>
</html>
